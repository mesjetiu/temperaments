<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Temperament Visualizer</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #111827; --surface: #1f2937; --border: #374151;
    --text: #e0e0e0; --muted: #9ca3af; --accent: #60a5fa;
    --c0: #60a5fa; --c0a: rgba(96,165,250,0.18);
    --c1: #f87171; --c1a: rgba(248,113,113,0.18);
    --c2: #4ade80; --c2a: rgba(74,222,128,0.18);
  }
  html, body { height: 100%; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); font-size: 13px; line-height: 1.4; }

  /* ═══ LAYOUT ═══ */
  #app { display: flex; height: 100vh; overflow: hidden; }

  #sidebar {
    width: 280px; flex-shrink: 0; background: var(--surface);
    padding: 14px; display: flex; flex-direction: column;
    border-right: 1px solid var(--border); overflow: hidden;
    transition: transform 0.28s ease; z-index: 200;
  }
  #sidebar h2 { font-size: 14px; color: var(--accent); margin-bottom: 10px; }
  #overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.55); z-index: 190; opacity: 0; transition: opacity 0.25s;
  }
  #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

  /* ═══ MOBILE ═══ */
  @media (max-width: 767px) {
    #app { flex-direction: column; height: 100dvh; }
    #sidebar {
      position: fixed; top: 0; left: 0; bottom: 0;
      width: min(85vw, 320px); transform: translateX(-105%);
      box-shadow: 4px 0 24px rgba(0,0,0,0.5);
    }
    #sidebar.open { transform: translateX(0); }
    #overlay.open { display: block; opacity: 1; }
    #main { flex: 1; overflow: hidden; }
    #mob-header { display: flex !important; }
    #content { flex-direction: column !important; padding: 12px !important; gap: 12px !important; }
    .panel { width: 100% !important; min-width: unset !important; }
    .panel canvas { max-height: 220px; }
    #circle-wrap svg { width: min(270px, 90vw); height: auto; }
    #audio-hint { display: none; }
  }

  /* ═══ MOB HEADER ═══ */
  #mob-header {
    display: none; background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 10px 14px; align-items: center; gap: 10px; flex-shrink: 0;
  }
  #hamburger {
    background: none; border: none; color: var(--accent); cursor: pointer;
    padding: 4px; flex-shrink: 0; display: flex; align-items: center;
  }
  #hamburger svg { width: 22px; height: 22px; }
  #mob-title { font-size: 14px; color: var(--accent); font-weight: 600; flex: 1; }
  #mob-badges { display: flex; gap: 6px; flex-wrap: wrap; overflow: hidden; max-height: 52px; }

  /* ═══ DESK HEADER ═══ */
  #desk-header {
    padding: 10px 18px; background: var(--surface); border-bottom: 1px solid var(--border);
    display: flex; gap: 8px; align-items: center; flex-wrap: wrap; min-height: 46px; flex-shrink: 0;
  }
  @media (max-width: 767px) { #desk-header { display: none; } }

  /* ═══ SEARCH / LIST ═══ */
  #search {
    width: 100%; padding: 7px 10px; background: var(--bg); border: 1px solid var(--border);
    color: var(--text); border-radius: 6px; font-size: 12px; margin-bottom: 6px; outline: none;
  }
  #search:focus { border-color: var(--accent); }
  #count { font-size: 11px; color: #6b7280; margin-bottom: 8px; }
  #list { flex: 1; overflow-y: auto; }
  #list::-webkit-scrollbar { width: 4px; }
  #list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .temp-item {
    padding: 6px 8px; cursor: pointer; border-radius: 4px; margin-bottom: 2px;
    border-left: 3px solid transparent; white-space: nowrap; overflow: hidden;
    text-overflow: ellipsis; font-size: 11.5px; color: #d1d5db;
    -webkit-tap-highlight-color: transparent;
  }
  .temp-item:hover, .temp-item:active { background: #1a2535; color: #fff; }
  .temp-item.sel0 { border-left-color: var(--c0); background: #1e3a5f; color: #bfdbfe; }
  .temp-item.sel1 { border-left-color: var(--c1); background: #3f1f1f; color: #fecaca; }
  .temp-item.sel2 { border-left-color: var(--c2); background: #1f3f2a; color: #bbf7d0; }

  /* ═══ BADGES ═══ */
  .badge {
    padding: 3px 10px; border-radius: 10px; font-size: 11px; max-width: 220px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    cursor: pointer; flex-shrink: 0; -webkit-tap-highlight-color: transparent;
  }
  .badge0 { background: #1d4ed8; } .badge1 { background: #991b1b; } .badge2 { background: #166534; }

  /* ═══ TABS ═══ */
  #tabs {
    display: flex; border-bottom: 1px solid var(--border); background: var(--surface);
    padding: 0 18px; overflow-x: auto; flex-shrink: 0;
    -webkit-overflow-scrolling: touch; scrollbar-width: none;
  }
  #tabs::-webkit-scrollbar { display: none; }
  .tab {
    padding: 10px 15px; cursor: pointer; font-size: 12px; color: #6b7280;
    border-bottom: 2px solid transparent; white-space: nowrap; transition: color 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .tab:hover { color: #9ca3af; }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* ═══ AUDIO BAR ═══ */
  #audio-bar {
    display: flex; align-items: center; gap: 7px; padding: 6px 18px;
    background: #161e2e; border-bottom: 1px solid var(--border);
    flex-wrap: wrap; flex-shrink: 0;
  }
  #audio-bar label { font-size: 11px; color: #6b7280; }
  .wb {
    padding: 3px 9px; border-radius: 4px; border: 1px solid var(--border);
    background: var(--bg); color: var(--muted); cursor: pointer; font-size: 11px;
    -webkit-tap-highlight-color: transparent; transition: background 0.12s;
  }
  .wb:hover { background: #1e2d45; color: var(--text); }
  .wb.sel { background: #1d4ed8; color: #fff; border-color: var(--accent); }
  #vol-sl { width: 72px; accent-color: var(--accent); cursor: pointer; }
  #audio-hint { font-size: 10px; color: #374151; font-style: italic; margin-left: auto; }
  #playing-dot {
    width: 7px; height: 7px; border-radius: 50%; background: var(--c2);
    display: none; flex-shrink: 0; box-shadow: 0 0 6px var(--c2);
    animation: pulse 0.8s ease-in-out infinite alternate;
  }
  @keyframes pulse { from { opacity: 0.5; } to { opacity: 1; } }

  /* ═══ CONTENT ═══ */
  #content {
    flex: 1; overflow-y: auto; padding: 18px;
    display: flex; gap: 16px; flex-wrap: wrap; align-content: flex-start;
  }
  #content::-webkit-scrollbar { width: 5px; }
  #content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  .panel { background: var(--surface); border-radius: 10px; padding: 16px; border: 1px solid var(--border); }
  .panel h3 { font-size: 12px; color: var(--accent); margin-bottom: 12px; font-weight: 600; }
  .empty-state { color: #4b5563; font-style: italic; padding: 60px; text-align: center; width: 100%; }

  /* canvas cursor when can play */
  .playable { cursor: crosshair; }

  table { border-collapse: collapse; width: 100%; font-size: 11px; }
  th { text-align: left; padding: 4px 8px; color: var(--accent); border-bottom: 1px solid var(--border); }
  td { padding: 3px 8px; }
  tr:hover td { background: var(--bg); }
  .grad-bar { display: flex; align-items: center; gap: 6px; font-size: 10px; color: #6b7280; margin-bottom: 10px; flex-wrap: wrap; }
  .grad-strip {
    height: 10px; border-radius: 3px; flex: 1; min-width: 60px;
    background: linear-gradient(to right, #ef4444 0%, #f97316 25%, #22c55e 45%, #22c55e 55%, #a855f7 80%, #6366f1 100%);
  }
</style>
</head>
<body>
<div id="app">
  <div id="overlay" onclick="closeSidebar()"></div>

  <!-- ═══ SIDEBAR ═══ -->
  <div id="sidebar">
    <h2>Temperamentos</h2>
    <input id="search" type="text" placeholder="Buscar..." autocomplete="off">
    <div id="count">Cargando...</div>
    <div id="list"><div style="padding:14px;font-size:11px;color:#6b7280">Cargando datos...</div></div>
  </div>

  <!-- ═══ MAIN ═══ -->
  <div id="main">
    <div id="mob-header">
      <button id="hamburger" onclick="openSidebar()" aria-label="Abrir lista">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="3" y1="6"  x2="21" y2="6"/>
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
      <span id="mob-title">Temperament Visualizer</span>
      <div id="mob-badges"></div>
    </div>

    <div id="desk-header">
      <span style="font-size:12px;color:#6b7280;white-space:nowrap">Selecciona 1–3 temperamentos:</span>
      <div id="desk-badges" style="display:flex;gap:6px;flex-wrap:wrap;"></div>
    </div>

    <div id="tabs">
      <div class="tab active" data-tab="overview">Vista general</div>
      <div class="tab" data-tab="fifths">Quintas</div>
      <div class="tab" data-tab="thirds">Terceras</div>
      <div class="tab" data-tab="compare">Comparar</div>
    </div>

    <!-- AUDIO BAR -->
    <div id="audio-bar">
      <div id="playing-dot"></div>
      <label>Onda:</label>
      <button class="wb" data-wave="sine">Seno</button>
      <button class="wb sel" data-wave="sawtooth">Sierra</button>
      <button class="wb" data-wave="triangle">Triángulo</button>
      <button class="wb" data-wave="square">Cuadrada</button>
      <label style="margin-left:8px">🔊</label>
      <input type="range" id="vol-sl" min="0" max="1" step="0.05" value="0.4">
      <span id="audio-hint">mantén pulsado sobre las gráficas para escuchar</span>
    </div>

    <div id="content">
      <div class="empty-state">Selecciona un temperamento de la lista para empezar.</div>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
// CONSTANTES
// ══════════════════════════════════════════════
const NOTES     = ['C','C#','D','D#','E','F','F#','G','G#','A','B♭','B'];
const FIFTH_IDX = [0,7,2,9,4,11,6,1,8,3,10,5];
const FIFTH_LBL = ['C','G','D','A','E','B','F#','C#','G#','D#','B♭','F'];

const PURE_FIFTH = 701.955;
const PURE_MAJ3  = 386.314;
const PURE_MIN3  = 315.641;

const COLORS  = ['#60a5fa','#f87171','#4ade80'];
const COLORS_A= ['rgba(96,165,250,0.18)','rgba(248,113,113,0.18)','rgba(74,222,128,0.18)'];

// Cents desde A4=440Hz para cada nota en ET (C=0 → C4 = 261.6Hz)
const ET_FROM_A = [-900,-800,-700,-600,-500,-400,-300,-200,-100,0,100,200];

// ══════════════════════════════════════════════
// ESTADO
// ══════════════════════════════════════════════
let all       = [];
let selected  = [null, null, null];
let activeTab = 'overview';
let charts    = {};
let chartMeta = {}; // { id: { type, slotMap } }

// ══════════════════════════════════════════════
// AUDIO ENGINE
// ══════════════════════════════════════════════
let audioCtx   = null;
let masterGain = null;
let envGain    = null;
let activeOscs = [];
let currentWave = 'sawtooth';
let currentVol  = 0.4;

function getCtx() {
  if (!audioCtx || audioCtx.state === 'closed') {
    audioCtx   = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = currentVol;
    masterGain.connect(audioCtx.destination);
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function playFreqs(freqs) {
  stopSound(true); // hard stop, no fade
  const ctx = getCtx();
  const now = ctx.currentTime;
  envGain = ctx.createGain();
  envGain.gain.setValueAtTime(0, now);
  envGain.gain.linearRampToValueAtTime(1, now + 0.015); // 15ms attack
  envGain.connect(masterGain);
  activeOscs = freqs.map(freq => {
    const osc = ctx.createOscillator();
    osc.type = currentWave;
    osc.frequency.value = freq;
    osc.connect(envGain);
    osc.start(now);
    return osc;
  });
  document.getElementById('playing-dot').style.display = 'block';
}

function stopSound(hard = false) {
  document.getElementById('playing-dot').style.display = 'none';
  if (!audioCtx || !activeOscs.length) return;
  const ctx = audioCtx;
  const now = ctx.currentTime;
  const oscs = [...activeOscs];
  activeOscs = [];
  if (hard || !envGain) {
    oscs.forEach(o => { try { o.stop(); o.disconnect(); } catch(e){} });
    return;
  }
  // Soft release
  envGain.gain.cancelScheduledValues(now);
  envGain.gain.setValueAtTime(envGain.gain.value, now);
  envGain.gain.linearRampToValueAtTime(0, now + 0.07);
  setTimeout(() => oscs.forEach(o => { try { o.stop(); o.disconnect(); } catch(e){} }), 120);
}

// Waveform buttons
document.querySelectorAll('.wb').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.wb').forEach(b => b.classList.remove('sel'));
    btn.classList.add('sel');
    currentWave = btn.dataset.wave;
  });
});

// Volume slider
document.getElementById('vol-sl').addEventListener('input', function() {
  currentVol = parseFloat(this.value);
  if (masterGain) masterGain.gain.value = currentVol;
});

// Global mouseup / touchend to always stop sound
window.addEventListener('mouseup',     () => stopSound());
window.addEventListener('touchend',    () => stopSound(), { passive: true });
window.addEventListener('touchcancel', () => stopSound(), { passive: true });

// ══════════════════════════════════════════════
// FRECUENCIAS
// ══════════════════════════════════════════════
function noteFreq(noteIdx, offsets) {
  // Cents desde A4=440, incluyendo offset del temperamento
  const cents = ET_FROM_A[noteIdx] + offsets[noteIdx];
  return 440 * Math.pow(2, cents / 1200);
}

function playNote(noteIdx, offsets) {
  playFreqs([noteFreq(noteIdx, offsets)]);
}

function playFifthAudio(fifthOrderIdx, offsets) {
  const fif    = getFifths(offsets)[fifthOrderIdx];
  const rootNi = FIFTH_IDX[fifthOrderIdx];
  const fRoot  = noteFreq(rootNi, offsets);
  const fFifth = fRoot * Math.pow(2, fif.size / 1200);
  playFreqs([fRoot, fFifth]);
}

function playMaj3Audio(noteIdx, offsets) {
  const third = getMaj3(offsets)[noteIdx];
  const fRoot = noteFreq(noteIdx, offsets);
  playFreqs([fRoot, fRoot * Math.pow(2, third.size / 1200)]);
}

function playMin3Audio(noteIdx, offsets) {
  const third = getMin3(offsets)[noteIdx];
  const fRoot = noteFreq(noteIdx, offsets);
  playFreqs([fRoot, fRoot * Math.pow(2, third.size / 1200)]);
}

function playForType(type, idx, offsets) {
  switch(type) {
    case 'fifths':  playFifthAudio(idx, offsets); break;
    case 'maj3':    playMaj3Audio(idx, offsets);  break;
    case 'min3':    playMin3Audio(idx, offsets);  break;
    case 'offsets': playNote(idx, offsets);        break;
    case 'radar':   playNote(idx, offsets);        break;
  }
}

// ══════════════════════════════════════════════
// CHART AUDIO BINDING
// ══════════════════════════════════════════════
// slotMap: dataset index → selected[] slot index
function bindChartAudio(canvasId, type, slotMap) {
  chartMeta[canvasId] = { type, slotMap };
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  canvas.classList.add('playable');

  function getChartElem(clientX, clientY) {
    const chart = charts[canvasId];
    if (!chart) return null;
    // Chart.js 4.x: pass {clientX, clientY} — it handles getBoundingClientRect internally
    const els = chart.getElementsAtEventForMode(
      { clientX, clientY }, 'nearest', { intersect: true }, false
    );
    return els.length ? els[0] : null;
  }

  function interact(clientX, clientY) {
    const el = getChartElem(clientX, clientY);
    if (!el) return;
    const { datasetIndex, index } = el;
    const meta = chartMeta[canvasId];
    const slotIdx = meta.slotMap[datasetIndex];
    const temp = selected[slotIdx];
    if (!temp) return;
    playForType(meta.type, index, temp.offsets);
  }

  let pressing = false;

  canvas.addEventListener('mousedown', e => {
    e.preventDefault(); pressing = true;
    interact(e.clientX, e.clientY);
  });
  canvas.addEventListener('mousemove', e => {
    if (!pressing) return;
    interact(e.clientX, e.clientY);
  });
  canvas.addEventListener('mouseup',    () => { pressing = false; });
  canvas.addEventListener('mouseleave', () => { pressing = false; });

  canvas.addEventListener('touchstart', e => {
    e.preventDefault(); pressing = true;
    const t = e.touches[0];
    interact(t.clientX, t.clientY);
  }, { passive: false });

  canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    if (!pressing) return;
    const t = e.touches[0];
    interact(t.clientX, t.clientY);
  }, { passive: false });

  canvas.addEventListener('touchend',    () => { pressing = false; });
  canvas.addEventListener('touchcancel', () => { pressing = false; });
}

// ══════════════════════════════════════════════
// CIRCLE AUDIO BINDING (SVG event delegation)
// ══════════════════════════════════════════════
function bindCircleAudio() {
  const wrap = document.getElementById('circle-wrap');
  if (!wrap) return;
  wrap.style.cursor = 'crosshair';

  function getPath(clientX, clientY) {
    const el = document.elementFromPoint(clientX, clientY);
    return el?.closest('[data-fi]');
  }

  function interact(clientX, clientY) {
    const path = getPath(clientX, clientY);
    if (!path) return;
    const fi = parseInt(path.dataset.fi);
    const ti = parseInt(path.dataset.ti);
    const temp = selected[ti];
    if (!temp || isNaN(fi)) return;
    playFifthAudio(fi, temp.offsets);
  }

  let pressing = false;
  wrap.addEventListener('mousedown', e => { pressing = true; interact(e.clientX, e.clientY); });
  wrap.addEventListener('mousemove', e => { if (pressing) interact(e.clientX, e.clientY); });
  wrap.addEventListener('mouseup',    () => { pressing = false; });
  wrap.addEventListener('mouseleave', () => { pressing = false; });

  wrap.addEventListener('touchstart', e => {
    e.preventDefault(); pressing = true;
    const t = e.touches[0]; interact(t.clientX, t.clientY);
  }, { passive: false });
  wrap.addEventListener('touchmove', e => {
    e.preventDefault();
    if (!pressing) return;
    const t = e.touches[0]; interact(t.clientX, t.clientY);
  }, { passive: false });
  wrap.addEventListener('touchend',    () => { pressing = false; });
  wrap.addEventListener('touchcancel', () => { pressing = false; });
}

// ══════════════════════════════════════════════
// MÓVIL
// ══════════════════════════════════════════════
const isMobile = () => window.innerWidth < 768;
function openSidebar()  { document.getElementById('sidebar').classList.add('open'); document.getElementById('overlay').classList.add('open'); }
function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('overlay').classList.remove('open'); }

// ══════════════════════════════════════════════
// CARGA Y PARSEO
// ══════════════════════════════════════════════
async function loadData() {
  let text = null;
  for (const p of ['temperaments.md','./temperaments.md','../docs/temperaments.md']) {
    try { const r = await fetch(p); if (r.ok) { text = await r.text(); break; } } catch(e) {}
  }
  if (!text) {
    document.getElementById('list').innerHTML =
      '<div style="padding:14px;font-size:11px;color:#6b7280">No se pudo cargar temperaments.md.<br>Sirve desde docs/ con:<br><code>python -m http.server</code></div>';
    return;
  }
  parseMarkdown(text);
}

function parseMarkdown(text) {
  const temps = [];
  for (const line of text.split('\n')) {
    if (!line.startsWith('|')) continue;
    const cells = line.split('|').map(c => c.trim());
    if (cells.length < 15 || !cells[2] || cells[2] === 'Name' || cells[3].startsWith('--')) continue;
    const offsets = []; let ok = true;
    for (let i = 3; i <= 14; i++) { const v = parseFloat(cells[i]); if (isNaN(v)) { ok=false; break; } offsets.push(v); }
    if (!ok || offsets.length !== 12) continue;
    const m = cells[1].match(/\[([^\]]+)\]/);
    temps.push({ source: m ? m[1] : cells[1], name: cells[2], offsets });
  }
  all = temps;
  renderList(all);
  document.getElementById('count').textContent = `${all.length} temperamentos`;
}

// ══════════════════════════════════════════════
// LISTA
// ══════════════════════════════════════════════
function selClass(t) { const i=selected.findIndex(s=>s&&s.name===t.name); return i>=0?`sel${i}`:''; }

function renderList(temps) {
  const el = document.getElementById('list');
  if (!temps.length) { el.innerHTML = '<div style="padding:12px;font-size:11px;color:#6b7280">Sin resultados</div>'; return; }
  el.innerHTML = temps.map(t => {
    const i = all.indexOf(t);
    return `<div class="temp-item ${selClass(t)}" onclick="toggleSelect(${i})" title="${t.name} [${t.source}]">${t.name}</div>`;
  }).join('');
}

document.getElementById('search').addEventListener('input', function() {
  const q = this.value.toLowerCase();
  const f = all.filter(t => t.name.toLowerCase().includes(q) || t.source.toLowerCase().includes(q));
  document.getElementById('count').textContent = `${f.length} / ${all.length}`;
  renderList(f);
});

// ══════════════════════════════════════════════
// SELECCIÓN
// ══════════════════════════════════════════════
function toggleSelect(idx) {
  const t = all[idx];
  const ei = selected.findIndex(s => s && s.name === t.name);
  if (ei >= 0) { selected[ei] = null; }
  else { const e2=selected.findIndex(s=>!s); if(e2>=0) selected[e2]=t; else selected=[t,null,null]; }
  renderBadges();
  const q = document.getElementById('search').value.toLowerCase();
  renderList(all.filter(t2 => !q || t2.name.toLowerCase().includes(q) || t2.source.toLowerCase().includes(q)));
  if (isMobile()) closeSidebar();
  renderContent();
}

function renderBadges() {
  const html = selected.map((t,i) =>
    t ? `<span class="badge badge${i}" onclick="clearSel(${i})" title="Quitar">${shortName(t,28)} ×</span>` : ''
  ).join('');
  document.getElementById('desk-badges').innerHTML = html;
  document.getElementById('mob-badges').innerHTML  = html;
}

function clearSel(i) {
  selected[i]=null; renderBadges();
  const q=document.getElementById('search').value.toLowerCase();
  renderList(all.filter(t=>!q||t.name.toLowerCase().includes(q)));
  renderContent();
}

// ══════════════════════════════════════════════
// TABS
// ══════════════════════════════════════════════
document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', function() {
  document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
  this.classList.add('active'); activeTab = this.dataset.tab; renderContent();
}));

// ══════════════════════════════════════════════
// CÁLCULOS MUSICALES
// ══════════════════════════════════════════════
const getFifths = off => FIFTH_IDX.map((ni,i) => {
  const nj=FIFTH_IDX[(i+1)%12], size=700+off[nj]-off[ni];
  return { from:FIFTH_LBL[i], to:FIFTH_LBL[(i+1)%12], size, dev:size-PURE_FIFTH };
});
const getMaj3 = off => NOTES.map((n,i) => {
  const j=(i+4)%12, size=400+off[j]-off[i];
  return { from:n, to:NOTES[j], size, dev:size-PURE_MAJ3 };
});
const getMin3 = off => NOTES.map((n,i) => {
  const j=(i+3)%12, size=300+off[j]-off[i];
  return { from:n, to:NOTES[j], size, dev:size-PURE_MIN3 };
});

// ══════════════════════════════════════════════
// COLORES
// ══════════════════════════════════════════════
function fifthColor(dev) {
  const t=Math.max(-1,Math.min(1,dev/8));
  if(t<=0){const r=Math.round(239*(-t)),g=Math.round(180*(1+t*0.6));return `rgb(${r},${g},30)`;}
  else{const g=Math.round(100*(1-t)),b=Math.round(255*t);return `rgb(140,${g},${b})`;}
}

// ══════════════════════════════════════════════
// CÍRCULO DE QUINTAS SVG
// ══════════════════════════════════════════════
function drawCircle(selTemps) {
  const S=270, cx=S/2, cy=S/2, R=108, gap=0.04;
  let svg=`<svg viewBox="0 0 ${S} ${S}" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:270px;height:auto">`;
  svg+=`<circle cx="${cx}" cy="${cy}" r="${R+8}" fill="none" stroke="#374151" stroke-width="1"/>`;
  svg+=`<circle cx="${cx}" cy="${cy}" r="38" fill="#111827"/>`;

  selTemps.forEach((temp,ti) => {
    if (!temp) return;
    const fif=getFifths(temp.offsets);
    const ro=R-ti*19, ri=ro-17;
    fif.forEach((f,i) => {
      const a0=(i/12)*2*Math.PI-Math.PI/2, a1=((i+1)/12)*2*Math.PI-Math.PI/2;
      const c=(a,r)=>[cx+r*Math.cos(a),cy+r*Math.sin(a)];
      const [x1,y1]=c(a0+gap,ro),[x2,y2]=c(a1-gap,ro),[x3,y3]=c(a1-gap,ri),[x4,y4]=c(a0+gap,ri);
      svg+=`<path d="M${x1},${y1} A${ro},${ro} 0 0,1 ${x2},${y2} L${x3},${y3} A${ri},${ri} 0 0,0 ${x4},${y4} Z"
        fill="${fifthColor(f.dev)}" stroke="#111827" stroke-width="0.8"
        data-fi="${i}" data-ti="${ti}" style="cursor:crosshair">
        <title>${f.from}→${f.to}: ${f.size.toFixed(2)}¢ (${f.dev>=0?'+':''}${f.dev.toFixed(3)}¢)</title>
      </path>`;
    });
  });

  FIFTH_LBL.forEach((lbl,i) => {
    const a=(i/12)*2*Math.PI-Math.PI/2;
    svg+=`<text x="${cx+(R+18)*Math.cos(a)}" y="${cy+(R+18)*Math.sin(a)}"
      text-anchor="middle" dominant-baseline="middle"
      font-size="11" fill="#d1d5db" font-family="sans-serif" font-weight="500">${lbl}</text>`;
  });

  const act=selTemps.filter(Boolean);
  if (act.length>1) {
    act.forEach((t,i)=>{
      const ro2=R-i*19,ri2=ro2-17;
      svg+=`<circle cx="${cx-78}" cy="${cy+28+i*15}" r="5" fill="${COLORS[i]}"/>`;
      svg+=`<text x="${cx-70}" y="${cy+32+i*15}" font-size="7.5" fill="#9ca3af" font-family="sans-serif">${shortName(t,18)}</text>`;
    });
  }
  svg+='</svg>';
  return svg;
}

// ══════════════════════════════════════════════
// TABLAS
// ══════════════════════════════════════════════
function statsTable(temp) {
  const fif=getFifths(temp.offsets),maj=getMaj3(temp.offsets);
  const wf=fif.reduce((a,b)=>Math.abs(a.dev)>Math.abs(b.dev)?a:b);
  const bf=fif.reduce((a,b)=>Math.abs(a.dev)<Math.abs(b.dev)?a:b);
  const avgF=fif.reduce((s,f)=>s+f.dev,0)/12;
  const wm=maj.reduce((a,b)=>Math.abs(a.dev)>Math.abs(b.dev)?a:b);
  const bm=maj.reduce((a,b)=>Math.abs(a.dev)<Math.abs(b.dev)?a:b);
  const f=(v)=>`${v>=0?'+':''}${v.toFixed(2)}¢`;
  const cc=v=>v>8?'#f87171':v<-4?'#fb923c':v>3?'#a78bfa':'#4ade80';
  return `<table>
    <tr><th>Métrica</th><th>Notas</th><th>Valor</th></tr>
    <tr><td style="color:var(--muted)">Quinta más pura</td><td>${bf.from}→${bf.to}</td><td style="color:${cc(bf.dev)}">${bf.size.toFixed(2)}¢ (${f(bf.dev)})</td></tr>
    <tr><td style="color:var(--muted)">Quinta más impura</td><td>${wf.from}→${wf.to}</td><td style="color:${cc(wf.dev)}">${wf.size.toFixed(2)}¢ (${f(wf.dev)})</td></tr>
    <tr><td style="color:var(--muted)">Desv. media quintas</td><td>—</td><td style="color:${cc(avgF)}">${f(avgF)}</td></tr>
    <tr><td style="color:var(--muted)">3ª mayor más pura</td><td>${bm.from}→${bm.to}</td><td style="color:#4ade80">${bm.size.toFixed(2)}¢ (${f(bm.dev)})</td></tr>
    <tr><td style="color:var(--muted)">3ª mayor más impura</td><td>${wm.from}→${wm.to}</td><td style="color:#f87171">${wm.size.toFixed(2)}¢ (${f(wm.dev)})</td></tr>
  </table>`;
}

function fifthsTable(temp, ci) {
  const fif=getFifths(temp.offsets);
  return `<table><tr><th>Quinta</th><th>¢</th><th>Desv.</th></tr>${fif.map(f=>{
    const c=f.dev<-5?'#f87171':f.dev>2?'#a78bfa':f.dev<-1?'#fb923c':'#4ade80';
    return `<tr><td style="color:var(--muted)">${f.from}→${f.to}</td><td>${f.size.toFixed(2)}</td>
      <td style="color:${c};text-align:right">${f.dev>=0?'+':''}${f.dev.toFixed(3)}¢</td></tr>`;
  }).join('')}</table>`;
}

function thirdsTableFn(temp) {
  const maj=getMaj3(temp.offsets);
  return `<table><tr><th>3ª Mayor</th><th>¢</th><th>Desv.</th></tr>${maj.map(t=>{
    const c=t.dev>15?'#f87171':t.dev>6?'#fb923c':t.dev<0?'#60a5fa':'#4ade80';
    return `<tr><td style="color:var(--muted)">${t.from}→${t.to}</td><td>${t.size.toFixed(2)}</td>
      <td style="color:${c};text-align:right">${t.dev>=0?'+':''}${t.dev.toFixed(2)}¢</td></tr>`;
  }).join('')}</table>`;
}

// ══════════════════════════════════════════════
// CHART.JS HELPERS
// ══════════════════════════════════════════════
function destroyCharts() {
  Object.values(charts).forEach(c => { try { c.destroy(); } catch(e){} });
  charts = {}; chartMeta = {};
}

const gridColor='#374151', tickColor='#9ca3af';
const baseOpts = {
  responsive: true, animation: { duration: 250 },
  plugins: { legend: { labels: { color:'#d1d5db', font:{size:11}, boxWidth:14 } } },
};

const shortName = (t,n=32) => t.name.length>n ? t.name.slice(0,n-1)+'…' : t.name;

// slotMap: maps dataset positions to selected[] indices
function activeSlotMap() {
  return selected.map((t,i)=>({t,i})).filter(x=>x.t).map(x=>x.i);
}

function mkBar(id, labels, datasets, yLabel, tipFmt, audioType) {
  const c=document.getElementById(id); if(!c) return;
  charts[id]=new Chart(c,{ type:'bar', data:{labels,datasets},
    options:{ ...baseOpts,
      plugins:{...baseOpts.plugins,tooltip:{callbacks:{label:tipFmt}}},
      scales:{
        x:{ticks:{color:tickColor,font:{size:9},maxRotation:40},grid:{color:gridColor}},
        y:{ticks:{color:tickColor,callback:v=>`${v>=0?'+':''}${v}¢`},grid:{color:gridColor},
           title:{display:true,text:yLabel,color:'#6b7280',font:{size:10}}}
      }
    }
  });
  if (audioType) bindChartAudio(id, audioType, activeSlotMap());
}

function mkLine(id, labels, datasets, yLabel, tipFmt, audioType) {
  const c=document.getElementById(id); if(!c) return;
  charts[id]=new Chart(c,{ type:'line', data:{labels,datasets},
    options:{ ...baseOpts,
      plugins:{...baseOpts.plugins,tooltip:{callbacks:{label:tipFmt}}},
      scales:{
        x:{ticks:{color:tickColor,font:{size:10}},grid:{color:gridColor}},
        y:{ticks:{color:tickColor,callback:v=>`${v>0?'+':''}${v}¢`},grid:{color:gridColor},
           title:{display:true,text:yLabel,color:'#6b7280',font:{size:10}}}
      }
    }
  });
  if (audioType) bindChartAudio(id, audioType, activeSlotMap());
}

function mkRadar(id, datasets) {
  const c=document.getElementById(id); if(!c) return;
  charts[id]=new Chart(c,{ type:'radar', data:{labels:NOTES,datasets},
    options:{ ...baseOpts,
      scales:{r:{
        ticks:{color:tickColor,backdropColor:'transparent',font:{size:9}},
        grid:{color:gridColor}, angleLines:{color:gridColor},
        pointLabels:{color:'#d1d5db',font:{size:isMobile()?10:12}}
      }}
    }
  });
  bindChartAudio(id, 'radar', activeSlotMap());
}

// Dataset shorthand
const ds=(t,i,data,extra={})=>({
  label:shortName(t), data,
  backgroundColor:COLORS_A[i], borderColor:COLORS[i],
  borderWidth: isMobile()?1.5:2, ...extra
});

// ══════════════════════════════════════════════
// VISTAS
// ══════════════════════════════════════════════
function renderContent() {
  destroyCharts(); stopSound(true);
  const act=selected.filter(Boolean);
  const el=document.getElementById('content');
  if (!act.length) { el.innerHTML='<div class="empty-state">Selecciona un temperamento de la lista para empezar.</div>'; return; }
  ({overview:viewOverview,fifths:viewFifths,thirds:viewThirds,compare:viewCompare}[activeTab])(act);
}

// ─── VISTA GENERAL ───
function viewOverview(act) {
  const mob=isMobile();
  document.getElementById('content').innerHTML=`
    <div class="panel" style="${mob?'width:100%':'width:290px'}">
      <h3>Círculo de quintas <small style="color:#4b5563;font-size:10px;font-weight:400">— pulsa un sector</small></h3>
      <div class="grad-bar"><span>−8¢</span><div class="grad-strip"></div><span>+4¢</span><span style="color:#4b5563">● pura=701.955¢</span></div>
      <div id="circle-wrap">${drawCircle(selected)}</div>
    </div>
    <div class="panel" style="flex:1;min-width:${mob?'0':'280px'};${mob?'width:100%':''}">
      <h3>Radar — offsets <small style="color:#4b5563;font-size:10px;font-weight:400">— pulsa un punto</small></h3>
      <canvas id="c-radar" ${mob?'height="200"':'height="240"'}></canvas>
    </div>
    ${act.length===1?`<div class="panel" style="${mob?'width:100%':'width:320px'}">
      <h3>Estadísticas</h3>
      <div style="font-size:10px;color:#6b7280;margin-bottom:8px">${act[0].name}</div>
      ${statsTable(act[0])}
    </div>`:''}
  `;
  mkRadar('c-radar', selected.map((t,i)=>!t?null:({
    label:shortName(t),data:t.offsets,backgroundColor:COLORS_A[i],borderColor:COLORS[i],borderWidth:2,pointRadius:4,
  })).filter(Boolean));
  bindCircleAudio();
}

// ─── QUINTAS ───
function viewFifths(act) {
  const mob=isMobile();
  const flbls=FIFTH_LBL.map((n,i)=>`${n}→${FIFTH_LBL[(i+1)%12]}`);
  document.getElementById('content').innerHTML=`
    <div class="panel" style="width:100%">
      <h3>Desviación de las 12 quintas respecto a la quinta pura (701.955 ¢) <small style="color:#4b5563;font-size:10px;font-weight:400">— pulsa una barra</small></h3>
      <canvas id="c-fifths" ${mob?'height="160"':'height="110"'}></canvas>
    </div>
    <div class="panel" style="${mob?'width:100%':'width:290px'}">
      <h3>Círculo de quintas</h3>
      <div class="grad-bar"><span>−8¢</span><div class="grad-strip"></div><span>+4¢</span></div>
      <div id="circle-wrap">${drawCircle(selected)}</div>
    </div>
    ${act.map(t=>{const ci=selected.indexOf(t);return`
    <div class="panel" style="flex:1;min-width:${mob?'0':'190px'};${mob?'width:100%':''}">
      <h3 style="color:${COLORS[ci]}">${shortName(t,40)}</h3>
      ${fifthsTable(t,ci)}
    </div>`;}).join('')}
  `;
  mkBar('c-fifths',flbls,
    selected.map((t,i)=>!t?null:({...ds(t,i,getFifths(t.offsets).map(f=>f.dev)),borderWidth:1})).filter(Boolean),
    'Desv. de quinta pura (¢)',
    ctx=>`${ctx.dataset.label}: ${ctx.parsed.y>=0?'+':''}${ctx.parsed.y.toFixed(3)}¢  (${(PURE_FIFTH+ctx.parsed.y).toFixed(2)}¢)`,
    'fifths'
  );
  bindCircleAudio();
}

// ─── TERCERAS ───
function viewThirds(act) {
  const mob=isMobile();
  document.getElementById('content').innerHTML=`
    <div class="panel" style="width:100%">
      <h3>Terceras mayores — desv. de la 3ª mayor pura (386.314 ¢) <small style="color:#4b5563;font-size:10px;font-weight:400">— pulsa una barra</small></h3>
      <canvas id="c-maj3" ${mob?'height="160"':'height="110"'}></canvas>
    </div>
    <div class="panel" style="width:100%">
      <h3>Terceras menores — desv. de la 3ª menor pura (315.641 ¢) <small style="color:#4b5563;font-size:10px;font-weight:400">— pulsa una barra</small></h3>
      <canvas id="c-min3" ${mob?'height="160"':'height="110"'}></canvas>
    </div>
    ${act.map(t=>{const ci=selected.indexOf(t);return`
    <div class="panel" style="flex:1;min-width:${mob?'0':'190px'};${mob?'width:100%':''}">
      <h3 style="color:${COLORS[ci]}">${shortName(t,40)}</h3>
      ${thirdsTableFn(t)}
    </div>`;}).join('')}
  `;
  mkBar('c-maj3',NOTES,
    selected.map((t,i)=>!t?null:({...ds(t,i,getMaj3(t.offsets).map(x=>x.dev)),borderWidth:1})).filter(Boolean),
    'Desv. de 3ª mayor pura (¢)',
    ctx=>`${ctx.dataset.label}: ${ctx.parsed.y>=0?'+':''}${ctx.parsed.y.toFixed(2)}¢  (${(PURE_MAJ3+ctx.parsed.y).toFixed(2)}¢)`,
    'maj3'
  );
  mkBar('c-min3',NOTES,
    selected.map((t,i)=>!t?null:({...ds(t,i,getMin3(t.offsets).map(x=>x.dev)),borderWidth:1})).filter(Boolean),
    'Desv. de 3ª menor pura (¢)',
    ctx=>`${ctx.dataset.label}: ${ctx.parsed.y>=0?'+':''}${ctx.parsed.y.toFixed(2)}¢  (${(PURE_MIN3+ctx.parsed.y).toFixed(2)}¢)`,
    'min3'
  );
}

// ─── COMPARAR ───
function viewCompare(act) {
  const mob=isMobile();
  const flbls=FIFTH_LBL.map((n,i)=>`${n}→${FIFTH_LBL[(i+1)%12]}`);
  document.getElementById('content').innerHTML=`
    <div class="panel" style="width:100%">
      <h3>Offsets de las 12 notas <small style="color:#4b5563;font-size:10px;font-weight:400">— pulsa un punto para escuchar la nota</small></h3>
      <canvas id="c-off" ${mob?'height="180"':'height="100"'}></canvas>
    </div>
    <div class="panel" style="width:100%">
      <h3>Quintas — desviación de pura <small style="color:#4b5563;font-size:10px;font-weight:400">— pulsa una barra</small></h3>
      <canvas id="c-fif" ${mob?'height="180"':'height="100"'}></canvas>
    </div>
    <div class="panel" style="width:100%">
      <h3>Terceras mayores — desviación de pura <small style="color:#4b5563;font-size:10px;font-weight:400">— pulsa una barra</small></h3>
      <canvas id="c-3rd" ${mob?'height="180"':'height="100"'}></canvas>
    </div>
  `;
  mkLine('c-off',NOTES,

    ctx=>`${ctx.dataset.label}: ${ctx.parsed.y>=0?'+':''}${ctx.parsed.y.toFixed(3)}¢`,
    'offsets'
  );
  mkBar('c-fif',flbls,
    selected.map((t,i)=>!t?null:({...ds(t,i,getFifths(t.offsets).map(f=>f.dev)),borderWidth:1})).filter(Boolean),
    'Desv. de quinta pura (¢)',
    ctx=>`${ctx.dataset.label}: ${ctx.parsed.y>=0?'+':''}${ctx.parsed.y.toFixed(3)}¢`,
    'fifths'
  );
  mkBar('c-3rd',NOTES,
    selected.map((t,i)=>!t?null:({...ds(t,i,getMaj3(t.offsets).map(x=>x.dev)),borderWidth:1})).filter(Boolean),
    'Desv. de 3ª mayor pura (¢)',
    ctx=>`${ctx.dataset.label}: ${ctx.parsed.y>=0?'+':''}${ctx.parsed.y.toFixed(2)}¢`,

  );
}
