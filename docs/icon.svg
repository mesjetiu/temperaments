<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#111827"/>
  <!-- Círculo de quintas estilizado: 12 puntos -->
  <g transform="translate(256,256)">
    <!-- Arcos de fondo -->
    <circle cx="0" cy="0" r="185" fill="none" stroke="#1f2937" stroke-width="28"/>
    <circle cx="0" cy="0" r="120" fill="none" stroke="#1f2937" stroke-width="18"/>
    <!-- 12 notas en círculo exterior -->
    <circle cx="0"      cy="-185"  r="14" fill="#60a5fa"/>
    <circle cx="90"     cy="-160"  r="11" fill="#4b5563"/>
    <circle cx="160"    cy="-90"   r="11" fill="#4b5563"/>
    <circle cx="185"    cy="0"     r="11" fill="#4b5563"/>
    <circle cx="160"    cy="90"    r="11" fill="#4b5563"/>
    <circle cx="90"     cy="160"   r="14" fill="#60a5fa"/>
    <circle cx="0"      cy="185"   r="11" fill="#4b5563"/>
    <circle cx="-90"    cy="160"   r="11" fill="#4b5563"/>
    <circle cx="-160"   cy="90"    r="11" fill="#4b5563"/>
    <circle cx="-185"   cy="0"     r="11" fill="#4b5563"/>
    <circle cx="-160"   cy="-90"   r="11" fill="#4b5563"/>
    <circle cx="-90"    cy="-160"  r="14" fill="#60a5fa"/>
    <!-- Líneas de quinta (C→G→D→A→E→B) -->
    <line x1="0" y1="-185"  x2="90"  y2="-160" stroke="#60a5fa" stroke-width="3" opacity="0.5"/>
    <line x1="90" y1="-160" x2="185" y2="0"    stroke="#60a5fa" stroke-width="3" opacity="0.5"/>
    <line x1="185" y1="0"   x2="90"  y2="160"  stroke="#60a5fa" stroke-width="3" opacity="0.5"/>
    <line x1="90" y1="160"  x2="0"   y2="185"  stroke="#60a5fa" stroke-width="3" opacity="0.5"/>
    <!-- Diapasón central -->
    <path d="M-10,-55 L10,-55 L14,10 Q14,28 0,34 Q-14,28 -14,10 Z" fill="#60a5fa" opacity="0.9"/>
    <rect x="-18" y="34" width="36" height="8" rx="4" fill="#60a5fa" opacity="0.9"/>
    <line x1="0" y1="34" x2="0" y2="-90" stroke="#60a5fa" stroke-width="3" opacity="0.4"/>
    <!-- Aguja afinación -->
    <line x1="0" y1="0" x2="62" y2="-80" stroke="#4ade80" stroke-width="5" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="8" fill="#4ade80"/>
  </g>
</svg>
